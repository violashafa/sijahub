services:
  sijahub-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kelompok7-sijahub
    # Kita pakai EXPOSE (Pintu Dalam), bukan PORTS (Pintu Luar)
    # Jadi tidak akan bentrok dengan siapa pun di luar!
    expose:
      - "5000"
    env_file:
      - ./backend/.env
    networks:
      - sijahub-net
    restart: always

  nginx-proxy:
    image: nginx:alpine
    container_name: kelompok7-nginx
    ports:
      - "8443:80" # Tamu masuk lewat 8443 (HTTPS kamu)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - sijahub-net
    depends_on:
      - sijahub-app
    restart: always

networks:
  sijahub-net:
    driver: bridge