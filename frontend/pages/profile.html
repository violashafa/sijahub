<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profil - SijaHub</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/header.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #f0f4f8;
            font-family: sans-serif;
        }

        /* ── WRAPPER UTAMA ── */
        .profile-container {
            max-width: 600px;
            width: 100%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* ── JUDUL ── */
        .profile-container h2 {
            text-align: center;
            color: #17a2b8;
            margin-top: 0;
            margin-bottom: 24px;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
        }

        /* ── AVATAR ── */
        .avatar-upload {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .avatar-preview {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #17a2b8;
            display: block;
            margin: 0 auto 10px;
        }

        .btn-ganti-foto {
            margin-top: 6px;
            cursor: pointer;
            border: none;
            background: none;
            color: #17a2b8;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .btn-ganti-foto:hover,
        .btn-ganti-foto:focus {
            background: #e8f7f9;
            outline: none;
        }

        /* ── FORM GROUP ── */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: #444;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            /* Mencegah zoom otomatis di iOS */
            font-size: 16px;
        }

        .form-group input:focus {
            border-color: #17a2b8;
            box-shadow: 0 0 0 3px rgba(23,162,184,0.15);
        }

        /* ── SECTION PASSWORD ── */
        .password-section {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
        }

        .password-section h3 {
            font-size: 0.95rem;
            color: #666;
            margin-top: 0;
            margin-bottom: 15px;
        }

        /* ── TOMBOL SIMPAN ── */
        .btn-save {
            width: 100%;
            padding: 15px;
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-top: 10px;
            /* Touch-friendly tap target */
            min-height: 48px;
        }

        .btn-save:hover {
            background: #138496;
            transform: translateY(-2px);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        /* ── RESPONSIVE: LAYAR KECIL ── */
        @media (max-width: 640px) {
            .profile-container {
                margin: 16px;          /* Margin kiri & kanan agar tidak nempel tepi */
                padding: 20px 16px;
                border-radius: 16px;
            }

            .avatar-preview {
                width: 90px;
                height: 90px;
            }

            .form-group input {
                padding: 11px 12px;
            }

            .btn-save {
                padding: 14px;
            }
        }

        /* ── RESPONSIVE: LAYAR SANGAT KECIL (≤380px) ── */
        @media (max-width: 380px) {
            .profile-container {
                margin: 10px;
                padding: 16px 12px;
            }
        }
    </style>
</head>
<body>
    <div id="header"></div>

    <div class="profile-container">
        <h2>Pengaturan Profil</h2>

        <form id="profileForm">
            <div class="avatar-upload">
                <img src="../assets/default-avatar.png" id="imgPreview" class="avatar-preview" alt="Foto Profil">
                <input type="file" id="inputAvatar" accept="image/*" style="display: none;">
                <br>
                <button type="button" class="btn-ganti-foto"
                    onclick="document.getElementById('inputAvatar').click()">
                    Ganti Foto Profil
                </button>
            </div>

            <div class="form-group">
                <label for="firstname">Nama Depan</label>
                <input type="text" id="firstname" autocomplete="given-name" required>
            </div>
            <div class="form-group">
                <label for="lastname">Nama Belakang</label>
                <input type="text" id="lastname" autocomplete="family-name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="email" required>
            </div>

            <div class="password-section">
                <h3>Ganti Password (Opsional)</h3>
                <div class="form-group">
                    <label for="oldPassword">Password Lama</label>
                    <input type="password" id="oldPassword"
                        placeholder="Masukkan password saat ini"
                        autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label for="newPassword">Password Baru</label>
                    <input type="password" id="newPassword"
                        placeholder="Masukkan password baru"
                        autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="btn-save">Simpan Perubahan</button>
        </form>
    </div>

    <script src="../js/header.js"></script>
    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        // 1. Load Data Profil Saat Halaman Dibuka
        async function loadProfile() {
            try {
                const res = await fetch('https://localhost:5000/api/auth/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const json = await res.json();
                if (json.success) {
                    document.getElementById('firstname').value = json.data.firstname;
                    document.getElementById('lastname').value = json.data.lastname || '';
                    document.getElementById('email').value = json.data.email;
                    if (json.data.avatar) {
                        document.getElementById('imgPreview').src = json.data.avatar;
                    }
                }
            } catch (err) {
                console.error("Gagal load profil:", err);
            }
        }

        // 2. Preview Foto Sebelum Upload
        document.getElementById('inputAvatar').onchange = evt => {
            const [file] = document.getElementById('inputAvatar').files;
            if (file) {
                document.getElementById('imgPreview').src = URL.createObjectURL(file);
            }
        };

        // 3. Proses Simpan Perubahan
        document.getElementById('profileForm').onsubmit = async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('firstname', document.getElementById('firstname').value);
            formData.append('lastname', document.getElementById('lastname').value);
            formData.append('email', document.getElementById('email').value);

            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            if (newPass !== "") {
                formData.append('oldPassword', oldPass);
                formData.append('newPassword', newPass);
            }

            const fileInput = document.getElementById('inputAvatar');
            if (fileInput.files[0]) {
                formData.append('avatar', fileInput.files[0]);
            }

            try {
                const res = await fetch('https://localhost:5000/api/auth/update-profile', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const result = await res.json();

                if (result.success) {
                    alert('Profil berhasil diperbarui!');
                    localStorage.setItem('userName', result.user.firstname);
                    if (result.user.avatar) {
                        localStorage.setItem('userAvatar', result.user.avatar);
                    }
                    location.reload();
                } else {
                    alert("Gagal: " + result.message);
                }
            } catch (err) {
                alert("Terjadi kesalahan server");
            }
        };

        // 4. Load Header
        fetch('../components/header.html')
            .then(r => r.text())
            .then(d => {
                document.getElementById('header').innerHTML = d;
                if (typeof updateNavbarByRole === "function") {
                    updateNavbarByRole();
                }
            });

        loadProfile();
    </script>
</body>
</html>
