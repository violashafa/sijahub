server {
    listen 80;
    server_name comneta4.tailc90b09.ts.net;

    root /usr/share/nginx/html;
    index pages/index.html;

    location / {
        # URUTAN CARI:
        # 1. Cari file asli (buat CSS/JS/Assets)
        # 2. Cari di folder pages (buat file .html kamu)
        # 3. Kalau gak ketemu, balik ke Beranda
        try_files $uri $uri/ /pages$uri /pages$uri.html /pages/index.html;
    }

    # JALUR DATA (BACKEND) - Biar Data Siswa gak 0
    location /api/ {
        proxy_pass http://sijahub-app:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}