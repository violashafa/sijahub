server {
    listen 80;
    server_name comneta4.tailc90b09.ts.net;

    # Nginx akan mencari index.html langsung di dalam folder pages
    root /usr/share/nginx/html/pages;
    index index.html;

    location / {
        # Jika file tidak ditemukan, tetap arahkan ke index.html di dalam pages
        try_files $uri $uri/ /index.html;
    }

    # Jalur data API ke Backend (Node.js)
    location /api/ {
        proxy_pass http://sijahub-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}