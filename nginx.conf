server {
    listen 80;
    server_name comneta4.tailc90b09.ts.net;

    # 1. Tampilan Web (Frontend)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Jalur Data (Backend)
    location /api/ {
        proxy_pass http://sijahub-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}