server {
    listen 80;
    server_name comneta4.tailc90b09.ts.net;

    # Kembalikan ke folder utama agar Nginx bisa lihat semua folder (css, assets, js)
    root /usr/share/nginx/html;

    # Halaman utama otomatis buka index.html yang ada di dalam folder pages
    index pages/index.html;

    location / {
        # Cek file yang diminta, kalau tidak ada, lari ke pages/index.html
        try_files $uri $uri/ /pages/index.html;
    }

    # Jalur data API ke Backend
    location /api/ {
        proxy_pass http://sijahub-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}