server {
    listen 80;
    server_name comneta4.tailc90b09.ts.net;

    # Kembalikan root ke folder utama agar Nginx bisa lihat folder css, js, assets
    root /usr/share/nginx/html;
    index pages/index.html;

    location / {
        # Jika orang buka website, arahkan otomatis ke folder pages
        try_files $uri $uri/ /pages/index.html;
    }

    # Jalur data API ke Backend
    location /api/ {
        proxy_pass http://sijahub-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}